{% extends 'base.html' %}

{% block content %}
<h1>All Notes</h1>

<a href="{% url 'note_create' %}">+ Create New Note</a>

<ul>
    {% for note in notes %}
        <li>
            <a href="{% url 'note_detail' note.pk %}">
                {{ note.title }}
            </a>
        </li>
    {% empty %}
        <p>No notes yet.</p>
    {% endfor %}
</ul>
{% endblock %}
